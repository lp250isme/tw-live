<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/icon.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" href="/icon-dark.png" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="台灣即時資料戰情室 — 一站匯集政府公開的即時資料：水情、空品、天氣、交通、能源。" />
    <meta name="theme-color" content="#050b18" />
    <title>台灣即時 · 開放資料戰情室</title>
    <script>
      // Pre-paint theme: apply resolved data-theme before first paint to avoid flash.
      (function () {
        try {
          var c = localStorage.getItem('twlive-theme') || 'dark';
          var dark = c === 'dark' || (c === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
